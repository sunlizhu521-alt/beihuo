<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>备货需求分配 - 备货需求分配</title>
    <link rel="stylesheet" href="./styles.css?v=20260609-6" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="备货需求分配">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">BH</span>
          <div>
            <strong>备货需求分配</strong>
            <span>需求分配工作台</span>
          </div>
        </div>
        <nav class="nav-list">
          <a class="active" href="./index.html">备货需求分配</a>
        </nav>
      </aside>

      <main class="dashboard">
        <header class="topbar">
          <div>
            <p class="eyebrow">File Library</p>
            <h1>备货需求分配</h1>
            <small class="source-note" id="librarySourceNote">本地文件库｜引用时间：--</small>
          </div>
          <div class="topbar-actions">
            <button id="applyAllButton" class="primary-button" type="button" disabled>一键刷新应用</button>
            <button id="clearCacheButton" class="danger-button" type="button">一键清除缓存</button>
          </div>
        </header>

        <section class="summary-grid" aria-label="文件库概览">
          <article class="metric">
            <span>文件槽位</span>
            <strong id="slotCount">4</strong>
            <small>分配文件</small>
          </article>
          <article class="metric">
            <span>已上传</span>
            <strong id="uploadedCount">0</strong>
            <small>含待应用文件</small>
          </article>
          <article class="metric">
            <span>已引用</span>
            <strong id="appliedCount">0</strong>
            <small>当前生效文件</small>
          </article>
          <article class="metric result-metric">
            <span>备货总数</span>
            <strong id="beihuoTotal">0</strong>
            <small>按筛选后数量</small>
          </article>
          <article class="metric result-metric">
            <span>供应商数量</span>
            <strong id="supplierCount">0</strong>
            <small>按供应商简称去重</small>
          </article>
        </section>

        <section class="panel filter-panel" aria-label="备货筛选器">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Filters</p>
              <h2>筛选条件</h2>
            </div>
            <button id="clearFiltersButton" type="button">重置筛选</button>
          </div>
          <div class="filter-toolbar" id="filterToolbar">
            <div class="multi-filter" data-filter="businessUnit"></div>
            <div class="multi-filter" data-filter="productLine"></div>
            <div class="multi-filter" data-filter="purchaseGroup"></div>
            <div class="multi-filter" data-filter="buyer"></div>
            <div class="multi-filter" data-filter="supplierShortName"></div>
          </div>
        </section>

        <section class="panel library-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Files</p>
              <h2>文件上传与应用</h2>
            </div>
            <span class="upload-state" id="libraryState">读取中</span>
          </div>
          <div class="slot-grid" id="slotGrid"></div>
        </section>

        <section class="panel detail-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Details</p>
              <h2>备货需求分配明细</h2>
            </div>
            <div class="detail-actions">
              <button id="downloadDetailButton" class="secondary-button" type="button" disabled>下载表格</button>
              <span class="upload-state" id="detailState">暂无数据</span>
            </div>
          </div>
          <div class="table-wrap">
            <table class="detail-table">
              <thead>
                <tr>
                  <th>采购组</th>
                  <th>采购单订单下单人</th>
                  <th>申请人</th>
                  <th>供应商简称</th>
                  <th>OA备货流程号</th>
                  <th>物料编码</th>
                  <th>SKU</th>
                  <th>物料名称</th>
                  <th>数量</th>
                </tr>
              </thead>
              <tbody id="detailTableBody"></tbody>
            </table>
            <div class="empty-state" id="detailEmpty">上传并应用表格后显示明细</div>
          </div>
        </section>
      </main>
    </div>

    <script src="./vendor/xlsx.full.min.js?v=20260601-1"></script>
    <script src="./vendor/jszip.min.js?v=20260609-1"></script>
    <script src="./shared-library.js?v=20260609-3"></script>
    <script src="./file-library.js?v=20260609-13"></script>
  </body>
</html>
